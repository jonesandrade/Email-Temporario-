<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Mail PRO</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; padding: 20px; background: #111; border-radius: 15px; border: 1px solid #222; }
        button { width: 100%; padding: 12px; background: cyan; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; border-radius: 5px; }
        #email { background: #000; padding: 15px; margin-bottom: 15px; text-align: center; border-radius: 5px; border: 1px dashed #444; color: cyan; font-family: monospace; }
        .msg { background: #1a1a1a; padding: 10px; margin-top: 10px; border-radius: 8px; border-left: 4px solid cyan; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; color: cyan;">Temp Mail PRO</h2>
        <button onclick="gerar()">GERAR NOVO EMAIL</button>
        <div id="email">Clique para gerar</div>
        <button onclick="simular()" style="background: transparent; border: 1px solid cyan; color: cyan;">SIMULAR TESTE</button>
        <div id="inbox"></div>
    </div>

    <script>
        let emailAtual = "";
        function gerar() {
            fetch("/gerar").then(r => r.json()).then(d => {
                emailAtual = d.email;
                document.getElementById("email").innerText = emailAtual;
                carregar();
            });
        }
        function simular() {
            if(!emailAtual) return alert("Gere um email!");
            fetch("/enviar", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ email: emailAtual, sender: "teste@dev.com", subject: "Olá!", message: "Seu sistema está funcionando!" })
            }).then(() => carregar());
        }
        function carregar() {
            if(!emailAtual) return;
            fetch("/mensagens/" + emailAtual).then(r => r.json()).then(data => {
                let box = document.getElementById("inbox");
                box.innerHTML = data.length ? "" : "<p style='text-align:center; color:#666'>Vazio...</p>";
                data.forEach(m => {
                    box.innerHTML += `<div class="msg"><b>De:</b> ${m.from}<br><b>Assunto:</b> ${m.subject}<p>${m.message}</p></div>`;
                });
            });
        }
        setInterval(carregar, 4000);
    </script>
</body>
</html>
